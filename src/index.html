<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chat</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="app">
      <!-- Header -->
      <header id="header">
        <div class="header-left">
          <button id="session-btn" class="icon-btn" title="会话管理">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="9" y1="10" x2="15" y2="10"/>
            </svg>
          </button>
          <div class="avatar-group">
            <div class="avatar" id="chat-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <div class="header-info">
              <span class="header-title" id="session-name">新会话</span>
              <div class="connection-status">
                <span class="status-dot" id="status-dot"></span>
                <span class="status-text" id="status-text">连接中...</span>
              </div>
            </div>
          </div>
        </div>
        <div class="header-right">
          <button id="settings-btn" class="icon-btn" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Settings Panel -->
      <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-content">
          <h3>连接设置</h3>
          <div class="setting-item">
            <label for="ws-url-input">WebSocket 地址</label>
            <div class="input-group">
              <input type="text" id="ws-url-input" value="ws://39.107.55.13:8095" placeholder="ws://example.com:8089" />
              <button id="reconnect-btn" class="btn-primary">重新连接</button>
            </div>
          </div>
          <div class="setting-item">
            <label for="username-input">显示名称</label>
            <input type="text" id="username-input" value="我" placeholder="你的名称" />
          </div>
          <button id="settings-close-btn" class="btn-secondary">关闭</button>
        </div>
      </div>

      <!-- Session Panel -->
      <div id="session-panel" class="session-panel hidden">
        <div class="session-content">
          <div class="session-header">
            <h3>会话管理</h3>
            <button id="new-session-btn" class="btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              新建会话
            </button>
          </div>
          <div id="session-list" class="session-list">
            <!-- Session items will be rendered here -->
          </div>
          <button id="session-close-btn" class="btn-secondary">关闭</button>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="messages-container">
        <div id="messages">
        </div>
        <div id="scroll-bottom-hint" class="scroll-bottom-hint hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>

      <!-- Input Area -->
      <div id="input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            placeholder="输入消息..."
            rows="1"
          ></textarea>
          <button id="send-btn" class="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>
  </body>
</html>
